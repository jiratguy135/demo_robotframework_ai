name: Fintech E2E Regression Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize Playwright (rfbrowser)
        run: rfbrowser init

      - name: Run Robot Framework Tests
        # ตรงนี้เราจะรันแค่ Web Case ที่คุณทำผ่านแล้วก่อน
        run: robot --outputdir results tests/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results/